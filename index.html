<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #161E54, #2a3570);
            padding: 20px;
        }

        .container {
            max-width: 1300px;
            margin: auto;
        }

        .parent-card {
            display: flex;
            gap: 20px;
        }

        h1 {
            text-align: center;
            color: #BBE0EF;
            margin-bottom: 20px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            width: 100%;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 2px solid #BBE0EF;
        }

        button {
            padding: 10px 20px;
            background: #F16D34;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .weather-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-left: 4px solid #F16D34;
            margin-bottom: 6px;
            background: #f9f9f9;
        }

        .console {
            background: #161E54;
            color: #BBE0EF;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            max-height: 250px;
            overflow-y: auto;
        }

        .history button {
            margin: 5px;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #F16D34;
            background: #fff;
            color: #F16D34;
            transition: 0.3s;
        }

        .history button:hover {
            background: #F16D34;
            color: #fff;
        }

        .clear-link {
            display: block;
            margin-top: 10px;
            color: #161E54;
            font-size: 0.8rem;
            cursor: pointer;
            text-decoration: underline;
        }

        @media (max-width:700px) {
            .parent-card {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <h1>🌥️ Async Weather Tracker</h1>

        <div class="parent-card">
            <div class="card">
                <h3>Search City</h3>
                <div class="input-group">
                    <input id="cityInput" placeholder="Delhi, London">
                    <button id="searchBtn">Search</button>
                </div>
                <br>
                <br>
                <h3>Search History</h3>
                <div class="history" id="history"></div>
                <span class="clear-link" id="clearBtn">Clear History</span>
            </div>

            <div class="card">
                <h3>Weather Info</h3>
                <div id="weather"></div>
            </div>
        </div>
    </div>

    <script>
        // Using your provided API Key
        const API_KEY = "3d719a8d7c0062a462924a519c4593d5";

        const weatherBox = document.getElementById("weather");
        const historyBox = document.getElementById("history");
        const cityInput = document.getElementById("cityInput");

        /* ---------- WEATHER FETCH ---------- */
        async function getWeather(city) {
            const res = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
            );
            if (!res.ok) {
                throw new Error("City not found");
            }
            return await res.json();
        }

        /* ---------- BUTTON CLICK ---------- */
        document.getElementById("searchBtn").onclick = () => {
            const city = cityInput.value.trim();
            if (city) {
                search(city);
            }
        };

        /* ---------- UI RENDER ---------- */
        function renderWeather(d) {
            weatherBox.innerHTML = `
                <div class="weather-item"><label>City</label><span>${d.name}, ${d.sys.country}</span></div>
                <div class="weather-item"><label>Temperature</label><span>${Math.round(d.main.temp)} °C</span></div>
                <div class="weather-item"><label>Weather</label><span>${d.weather[0].main}</span></div>
                <div class="weather-item"><label>Humidity</label><span>${d.main.humidity}%</span></div>
                <div class="weather-item"><label>Wind Speed</label><span>${d.wind.speed} m/s</span></div>
            `;
        }

        /* ---------- SAVE SEARCH HISTORY ---------- */
        function saveHistory(city) {
            // Get data from localStorage, or start empty array
            let searches = JSON.parse(localStorage.getItem("weather_history")) || [];

            // Prevent duplicates and keep only last 5
            if (!searches.includes(city)) {
                searches.unshift(city); 
                searches = searches.slice(0, 5); 
                localStorage.setItem("weather_history", JSON.stringify(searches));
                showHistory();
            }
        }

        /* ---------- SHOW HISTORY ---------- */
        function showHistory() {
            const searches = JSON.parse(localStorage.getItem("weather_history")) || [];
            historyBox.innerHTML = ""; // Clear existing

            searches.forEach(city => {
                const btn = document.createElement("button");
                btn.textContent = city;
                btn.onclick = () => search(city);
                historyBox.appendChild(btn);
            });
        }

        /* ---------- SEARCH FUNCTION ---------- */
        async function search(city) {
            weatherBox.innerHTML = "<i>Loading data...</i>";
            try {
                const data = await getWeather(city);
                renderWeather(data);
                saveHistory(data.name); 
                cityInput.value = ""; // Clear input after success
            } catch (error) {
                weatherBox.innerHTML = `<p style="color:red">${error.message}</p>`;
            }
        }
        
        /* ---------- CLEAR HISTORY ---------- */
        document.getElementById("clearBtn").onclick = () => {
            localStorage.removeItem("weather_history");
            showHistory();
        };

        /* ---------- ENTER KEY SEARCH ---------- */
        cityInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const city = cityInput.value.trim();
                if (city) search(city);
            }
        });

        /* ---------- INITIAL LOAD ---------- */
        showHistory();
    </script>
</body>

</html>
