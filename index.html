<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Atmospheric // Obsidian OS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #F16D34;
            --accent-glow: rgba(241, 109, 52, 0.4);
            --bg: #020408;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
            --reflection: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0) 40%, rgba(255,255,255,0.03) 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,10%,1) 0, transparent 40%), 
                radial-gradient(at 100% 0%, hsla(339,49%,12%,1) 0, transparent 40%),
                radial-gradient(at 50% 100%, hsla(225,39%,8%,1) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
            overflow: hidden;
        }

        .main-grid {
            display: grid;
            grid-template-areas: 
                "sidebar weather"
                "console console";
            grid-template-columns: 400px 1fr;
            grid-template-rows: 1fr 220px;
            gap: 20px;
            width: 100%;
            max-width: 1400px;
            height: 90vh;
            animation: bootSequence 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes bootSequence {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .obsidian-panel {
            position: relative;
            background: var(--glass);
            /* Fixed Safari support: -webkit-backdrop-filter */
            -webkit-backdrop-filter: blur(80px) saturate(210%);
            backdrop-filter: blur(80px) saturate(210%);
            border: 1px solid var(--border);
            border-radius: 40px;
            overflow: hidden;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.05), 0 30px 60px rgba(0,0,0,0.9);
        }

        .obsidian-panel::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--reflection);
            pointer-events: none;
            opacity: 0.5;
        }

        .area-sidebar { grid-area: sidebar; display: flex; flex-direction: column; gap: 20px; }
        .area-weather { grid-area: weather; display: flex; flex-direction: column; justify-content: center; padding: 80px; }
        .area-console { grid-area: console; padding: 30px 50px; }

        .brand-box { padding: 40px; flex: 1; display: flex; flex-direction: column; align-items: center; }
        
        h1 { 
            font-size: 2.2rem; 
            font-weight: 800; 
            letter-spacing: -2px; 
            margin-bottom: 30px; 
            background: linear-gradient(to right, #fff, rgba(255,255,255,0.2)); 
            /* Fixed background-clip support */
            background-clip: text;
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            text-align: center; 
        }

        input {
            width: 100%; padding: 22px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 20px; color: #fff; font-size: 1rem; outline: none; transition: 0.4s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 40px rgba(241, 109, 52, 0.15); }

        button#searchBtn {
            width: 100%; margin-top: 15px; padding: 20px; background: var(--accent); border: none; border-radius: 20px; color: #fff; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s;
        }
        button#searchBtn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px var(--accent-glow); }

        .archive-box { padding: 35px; background: rgba(255,255,255,0.01); border-top: 1px solid var(--border); margin-top: auto; width: 100%; }
        .label-micro { font-size: 0.6rem; color: var(--accent); font-weight: 800; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; display: block; text-align: center; }
        
        .history-flow { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .archive-pill { padding: 8px 18px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 100px; font-size: 0.75rem; cursor: pointer; transition: 0.3s; }
        .archive-pill:hover { background: #fff; color: #000; font-weight: 700; }

        .wipe-btn { 
            margin-top: 25px; 
            background: none; 
            border: none; 
            color: rgba(255,255,255,0.2); 
            font-size: 0.65rem; 
            font-weight: 800; 
            letter-spacing: 3px; 
            cursor: pointer; 
            text-transform: uppercase; 
            width: 100%; 
            text-align: center; 
            transition: 0.3s;
        }
        .wipe-btn:hover { color: #ff4d4d; transform: scale(1.05); }

        .temp-massive { 
            font-size: 12rem; font-weight: 800; line-height: 0.8; letter-spacing: -12px; 
            background: linear-gradient(to bottom, #fff 50%, var(--accent)); 
            background-clip: text; -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; margin: 30px 0; text-align: center; 
        }
        .location-id { font-size: 1.2rem; font-weight: 200; letter-spacing: 10px; color: var(--accent); text-transform: uppercase; text-align: center; }
        
        .data-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            margin-top: 60px; 
            padding-top: 40px; 
            border-top: 1px solid var(--border); 
        }
        
        .data-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .data-node span { font-size: 2rem; font-weight: 400; }

        .console-feed { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: rgba(255,255,255,0.3); line-height: 1.8; overflow-y: auto; height: 130px; }
        .active-log { color: #fff; border-left: 3px solid var(--accent); padding-left: 15px; margin: 5px 0; }

        @media (max-width: 1100px) {
            .main-grid { grid-template-areas: "sidebar" "weather" "console"; grid-template-columns: 1fr; grid-template-rows: auto auto auto; height: auto; }
            .temp-massive { font-size: 7rem; }
        }
    </style>
</head>
<body>

<div class="main-grid">
    <div class="area-sidebar">
        <div class="obsidian-panel brand-box">
            <h1>Atmospheric.</h1>
            <input id="cityInput" placeholder="Enter location" autocomplete="off">
            <button id="searchBtn">Synchronize</button>

            <div class="archive-box">
                <label class="label-micro">Archived coordinates</label>
                <div class="history-flow" id="history"></div>
                <button class="wipe-btn" id="clearBtn">Wipe history</button>
            </div>
        </div>
    </div>

    <div class="obsidian-panel area-weather" id="weather">
        <p style="text-align: center; opacity: 0.1; letter-spacing: 15px; text-transform: uppercase; font-weight: 300;">System standby</p>
    </div>

    <div class="obsidian-panel area-console">
        <label class="label-micro">System event loop feed</label>
        <div id="consoleOut" class="console-feed">
            > Kernel active...<br>
            > Awaiting synchronization request
        </div>
    </div>
</div>

<script>
    const API_KEY = "3d719a8d7c0062a462924a519c4593d5";
    const weatherBox = document.getElementById("weather");
    const historyBox = document.getElementById("history");
    const cityInput = document.getElementById("cityInput");
    const consoleOut = document.getElementById("consoleOut");

    function pushLog(msg, isNew = false) {
        const timestamp = new Date().toLocaleTimeString();
        const entry = `<div class="${isNew ? 'active-log' : ''}">[${timestamp}] ${msg}</div>`;
        consoleOut.innerHTML = entry + consoleOut.innerHTML;
        consoleOut.scrollTop = 0;
    }

    /* ---------- WEATHER FETCH ---------- */
    async function getWeather(city) {
        pushLog("(ASYNC) START fetching");
        const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`);
        if (!res.ok) {
            pushLog("(ASYNC) Error: Signal lost");
            throw new Error("Signal lost");
        }
        const data = await res.json();
        pushLog("(ASYNC) Data received");
        return data;
    }

    /* ---------- BUTTON CLICK ---------- */
    document.getElementById("searchBtn").onclick = () => { 
        const city = cityInput.value.trim();
        if(city) search(city); 
    };

    /* ---------- UI RENDER ---------- */
    function renderWeather(d) {
        weatherBox.innerHTML = `
            <div style="animation: bootSequence 0.8s ease forwards;">
                <div class="location-id">${d.name} // ${d.sys.country}</div>
                <div class="temp-massive">${Math.round(d.main.temp)}°</div>
                <div style="font-size: 2rem; font-weight: 200; opacity: 0.4; margin-top: -30px; text-align: center;">${d.weather[0].main}</div>
                
                <div class="data-grid">
                    <div class="data-node">
                        <label class="label-micro" style="margin-bottom: 10px;">Saturation</label>
                        <span>${d.main.humidity}%</span>
                    </div>
                    <div class="data-node">
                        <label class="label-micro" style="margin-bottom: 10px;">Velocity</label>
                        <span>${d.wind.speed} <small style="font-size:0.8rem">m/s</small></span>
                    </div>
                    <div class="data-node">
                        <label class="label-micro" style="margin-bottom: 10px;">Barometer</label>
                        <span>${d.main.pressure}</span>
                    </div>
                </div>
            </div>
        `;
    }

    /* ---------- SAVE SEARCH HISTORY ---------- */
    function saveHistory(city) {
        let h = JSON.parse(localStorage.getItem("obsidian_os_v3") || "[]");
        if (!h.includes(city)) {
            h = [city, ...h].slice(0, 4);
            localStorage.setItem("obsidian_os_v3", JSON.stringify(h));
            showHistory();
        }
    }

    /* ---------- SHOW HISTORY ---------- */
    function showHistory() {
        const h = JSON.parse(localStorage.getItem("obsidian_os_v3") || "[]");
        historyBox.innerHTML = h.map(c => `<div class="archive-pill" onclick="search('${c}')">${c}</div>`).join("");
    }

    /* ---------- SEARCH FUNCTION ---------- */
    async function search(city) {
        consoleOut.innerHTML = "";
        pushLog("Sync Start");

        // Event Loop Analysis Demo
        Promise.resolve().then(() => pushLog("Promise.then (Microtask)", true));
        setTimeout(() => pushLog("setTimeout (Macrotask)", true), 0);
        
        weatherBox.innerHTML = `<p style="text-align:center; opacity:0.3; letter-spacing:10px;">Process init...</p>`;

        try {
            const data = await getWeather(city);
            renderWeather(data);
            saveHistory(data.name);
            cityInput.value = "";
        } catch (e) {
            pushLog(`Critical: ${e.message}`);
            weatherBox.innerHTML = `<p style="color:var(--accent); text-align:center; letter-spacing:4px;">${e.message}</p>`;
        }
        pushLog("Sync End");
    }

    /* ---------- CLEAR HISTORY FUNCTION ---------- */
    document.getElementById("clearBtn").onclick = () => { 
        localStorage.removeItem("obsidian_os_v3"); 
        showHistory(); 
        pushLog("Sync: History cleared");
    };
    
    /* ---------- ENTER KEY SEARCH ---------- */
    cityInput.onkeydown = (e) => { 
        if(e.key === "Enter") {
            const city = cityInput.value.trim();
            if(city) search(city);
        }
    };
    
    /* ---------- INITIAL LOAD ---------- */
    showHistory();

</script>

</body>
</html>
